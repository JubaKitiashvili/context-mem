<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080816"/>
      <stop offset="50%" stop-color="#0c0a1e"/>
      <stop offset="100%" stop-color="#100e24"/>
    </linearGradient>
    <linearGradient id="lens-edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <radialGradient id="lens-fill" cx="0.35" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.03"/>
    </radialGradient>
    <radialGradient id="focus-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="30%" stop-color="#a78bfa" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ray-conv" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <radialGradient id="ambient-center" cx="0.35" cy="0.5" r="0.35">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stat-num-1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="stat-num-2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="stat-num-3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="stat-num-4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" rx="12" fill="url(#bg)"/>
  <rect width="1200" height="300" rx="12" fill="url(#ambient-center)"/>

  <!-- Subtle horizontal lines -->
  <g opacity="0.025" stroke="#818cf8" stroke-width="0.5">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
  </g>

  <!-- === LENS ICON (scaled 1.8x, positioned left) === -->
  <g transform="translate(48, 42) scale(1.7)">
    <!-- Incoming rays -->
    <g stroke="#94a3b8" stroke-linecap="round">
      <line x1="4" y1="18" x2="32" y2="42" stroke-width="3" opacity="0.4"/>
      <line x1="4" y1="38" x2="30" y2="50" stroke-width="2.5" opacity="0.35"/>
      <line x1="4" y1="56" x2="30" y2="58" stroke-width="3.5" opacity="0.45"/>
      <line x1="4" y1="64" x2="30" y2="64" stroke-width="4" opacity="0.5"/>
      <line x1="4" y1="72" x2="30" y2="70" stroke-width="3.5" opacity="0.45"/>
      <line x1="4" y1="90" x2="30" y2="78" stroke-width="2.5" opacity="0.35"/>
      <line x1="4" y1="110" x2="32" y2="86" stroke-width="3" opacity="0.4"/>
    </g>

    <!-- Lens body -->
    <ellipse cx="50" cy="64" rx="20" ry="38" fill="url(#lens-fill)"/>
    <ellipse cx="44" cy="50" rx="10" ry="18" fill="white" opacity="0.06"/>
    <ellipse cx="50" cy="64" rx="20" ry="38" fill="none" stroke="url(#lens-edge)" stroke-width="3"/>

    <!-- Converging rays -->
    <g stroke-linecap="round">
      <line x1="68" y1="38" x2="102" y2="64" stroke="url(#ray-conv)" stroke-width="2.5"/>
      <line x1="69" y1="48" x2="102" y2="64" stroke="url(#ray-conv)" stroke-width="2"/>
      <line x1="70" y1="57" x2="102" y2="64" stroke="url(#ray-conv)" stroke-width="1.5"/>
      <line x1="70" y1="64" x2="102" y2="64" stroke="url(#ray-conv)" stroke-width="3"/>
      <line x1="70" y1="71" x2="102" y2="64" stroke="url(#ray-conv)" stroke-width="1.5"/>
      <line x1="69" y1="80" x2="102" y2="64" stroke="url(#ray-conv)" stroke-width="2"/>
      <line x1="68" y1="90" x2="102" y2="64" stroke="url(#ray-conv)" stroke-width="2.5"/>
    </g>

    <!-- Focal point -->
    <circle cx="102" cy="64" r="14" fill="url(#focus-glow)"/>
    <circle cx="102" cy="64" r="5" fill="#a78bfa" opacity="0.6"/>
    <circle cx="102" cy="64" r="3" fill="#c4b5fd" opacity="0.8"/>
    <circle cx="102" cy="64" r="1.5" fill="white"/>

    <!-- Lens accent dots -->
    <circle cx="50" cy="26" r="2" fill="#22d3ee" opacity="0.5"/>
    <circle cx="50" cy="102" r="2" fill="#c084fc" opacity="0.5"/>
  </g>

  <!-- === TITLE AREA === -->

  <!-- "Context Mem" -->
  <text x="310" y="100" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="60" font-weight="800" fill="url(#title-grad)" letter-spacing="-2">Context Mem</text>

  <!-- Tagline -->
  <text x="314" y="136" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#94a3b8" letter-spacing="0.3">
    Persistent memory for AI agents. Fully local. Zero cost.
  </text>

  <!-- Gradient accent line -->
  <rect x="314" y="150" width="100" height="2" rx="1" fill="url(#accent-grad)" opacity="0.6"/>

  <!-- === STATS — bold numbers with labels === -->
  <g transform="translate(314, 172)">
    <!-- Stat 1: 98%+ -->
    <text x="0" y="28" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="32" font-weight="800" fill="url(#stat-num-1)">98%+</text>
    <text x="0" y="46" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b" letter-spacing="0.5">RETRIEVAL</text>

    <!-- Separator dot -->
    <circle cx="130" cy="30" r="2" fill="#334155"/>

    <!-- Stat 2: 99% -->
    <text x="158" y="28" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="32" font-weight="800" fill="url(#stat-num-2)">99%</text>
    <text x="158" y="46" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b" letter-spacing="0.5">TOKEN SAVINGS</text>

    <!-- Separator dot -->
    <circle cx="282" cy="30" r="2" fill="#334155"/>

    <!-- Stat 3: 44 -->
    <text x="310" y="28" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="32" font-weight="800" fill="url(#stat-num-3)">44</text>
    <text x="310" y="46" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b" letter-spacing="0.5">MCP TOOLS</text>

    <!-- Separator dot -->
    <circle cx="392" cy="30" r="2" fill="#334155"/>

    <!-- Stat 4: 1130 -->
    <text x="420" y="28" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="32" font-weight="800" fill="url(#stat-num-4)">1130</text>
    <text x="420" y="46" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748b" letter-spacing="0.5">TESTS PASSING</text>
  </g>

  <!-- === VERSION PILL === -->
  <g transform="translate(314, 248)">
    <rect x="0" y="0" width="48" height="22" rx="6" fill="url(#accent-grad)" opacity="0.12" stroke="url(#accent-grad)" stroke-opacity="0.25" stroke-width="0.5"/>
    <text x="9" y="15" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="11" font-weight="600" fill="#818cf8">v3.1</text>
    <text x="62" y="15" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#475569">Total Recall</text>
  </g>
</svg>
