<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080816"/>
      <stop offset="100%" stop-color="#100e24"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="ray-in" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#94a3b8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#94a3b8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#cbd5e1" stop-opacity="0.45"/>
    </linearGradient>
    <radialGradient id="vortex-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="#818cf8" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core-bright" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beam-out" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>

  <!-- Vortex ambient glow -->
  <circle cx="64" cy="58" r="36" fill="url(#vortex-glow)"/>

  <!-- Incoming scattered rays from all directions -->
  <g>
    <!-- Top -->
    <line x1="30" y1="8" x2="54" y2="40" stroke="url(#ray-in)" stroke-width="2" stroke-linecap="round"/>
    <line x1="64" y1="4" x2="64" y2="38" stroke="url(#ray-in)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="98" y1="8" x2="74" y2="40" stroke="url(#ray-in)" stroke-width="2" stroke-linecap="round"/>
    <!-- Left -->
    <line x1="8" y1="36" x2="42" y2="52" stroke="url(#ray-in)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="6" y1="58" x2="40" y2="58" stroke="url(#ray-in)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="8" y1="80" x2="42" y2="66" stroke="url(#ray-in)" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Right -->
    <line x1="120" y1="36" x2="86" y2="52" stroke="url(#ray-in)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="122" y1="58" x2="88" y2="58" stroke="url(#ray-in)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="120" y1="80" x2="86" y2="66" stroke="url(#ray-in)" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Noise fragments -->
  <g opacity="0.14">
    <rect x="36" y="12" width="7" height="1.5" rx="0.75" fill="#94a3b8" transform="rotate(25 39 12)"/>
    <rect x="86" y="14" width="8" height="1.5" rx="0.75" fill="#64748b" transform="rotate(-30 90 14)"/>
    <rect x="12" y="44" width="6" height="1" rx="0.5" fill="#94a3b8"/>
    <rect x="110" y="46" width="7" height="1" rx="0.5" fill="#64748b"/>
    <rect x="14" y="72" width="8" height="1.5" rx="0.75" fill="#94a3b8" transform="rotate(10 18 72)"/>
    <rect x="108" y="74" width="6" height="1.5" rx="0.75" fill="#64748b" transform="rotate(-8 111 74)"/>
  </g>

  <!-- Spiral rings (vortex) — outer to inner, increasingly bright -->
  <g fill="none" stroke-linecap="round">
    <!-- Outermost ring -->
    <ellipse cx="64" cy="58" rx="34" ry="30" stroke="#22d3ee" stroke-width="1" opacity="0.1"/>

    <!-- Ring 2 -->
    <path d="M90 48 A26 22 0 1 1 38 48" stroke="#22d3ee" stroke-width="1.2" opacity="0.15" fill="none"/>

    <!-- Ring 3 -->
    <ellipse cx="64" cy="58" rx="22" ry="18" stroke="#818cf8" stroke-width="1.2" opacity="0.2"/>

    <!-- Ring 4 -->
    <path d="M80 52 A14 12 0 1 1 48 52" stroke="#818cf8" stroke-width="1.5" opacity="0.3" fill="none"/>

    <!-- Ring 5 (inner) -->
    <ellipse cx="64" cy="58" rx="10" ry="8" stroke="#a78bfa" stroke-width="1.5" opacity="0.4"/>

    <!-- Innermost ring -->
    <ellipse cx="64" cy="58" rx="5" ry="4" stroke="#c084fc" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Spiral arm hints (rotation feel) -->
  <g opacity="0.12" fill="none" stroke-linecap="round">
    <path d="M98 58 Q 90 42 72 38 Q 54 34 42 46 Q 30 58 42 70 Q 54 80 68 74 Q 80 68 76 56 Q 72 46 64 58"
          stroke="url(#accent)" stroke-width="1"/>
  </g>

  <!-- Core glow -->
  <circle cx="64" cy="58" r="8" fill="url(#core-bright)"/>

  <!-- Core bright point -->
  <circle cx="64" cy="58" r="3" fill="#a78bfa" opacity="0.6"/>
  <circle cx="64" cy="58" r="1.5" fill="white" opacity="0.95"/>

  <!-- Output beam downward from core -->
  <line x1="64" y1="66" x2="64" y2="88" stroke="url(#beam-out)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="64" y1="66" x2="64" y2="86" stroke="#a78bfa" stroke-width="7" stroke-linecap="round" opacity="0.1"/>

  <!-- Output drop/gem at bottom -->
  <path d="M64 90 L70 100 L64 108 L58 100 Z"
        fill="none" stroke="url(#accent)" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M64 92 L68 100 L64 106 L60 100 Z"
        fill="url(#accent)" opacity="0.2"/>

  <!-- Drop vertex highlight -->
  <circle cx="64" cy="90" r="1.2" fill="#818cf8" opacity="0.5"/>
  <circle cx="64" cy="108" r="1" fill="#c084fc" opacity="0.4"/>
</svg>