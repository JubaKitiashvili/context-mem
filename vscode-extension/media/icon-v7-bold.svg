<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080816"/>
      <stop offset="100%" stop-color="#100e24"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <radialGradient id="core-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gem-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beam" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>

  <!-- Core glow -->
  <circle cx="64" cy="50" r="24" fill="url(#core-glow)"/>

  <!-- Incoming rays — fewer but BOLD -->
  <g stroke="#94a3b8" stroke-linecap="round">
    <!-- Top -->
    <line x1="28" y1="8" x2="52" y2="34" stroke-width="3" opacity="0.4"/>
    <line x1="64" y1="4" x2="64" y2="32" stroke-width="3.5" opacity="0.45"/>
    <line x1="100" y1="8" x2="76" y2="34" stroke-width="3" opacity="0.4"/>
    <!-- Left -->
    <line x1="8" y1="34" x2="38" y2="44" stroke-width="2.5" opacity="0.35"/>
    <line x1="6" y1="54" x2="38" y2="52" stroke-width="3" opacity="0.4"/>
    <!-- Right -->
    <line x1="120" y1="34" x2="90" y2="44" stroke-width="2.5" opacity="0.35"/>
    <line x1="122" y1="54" x2="90" y2="52" stroke-width="3" opacity="0.4"/>
  </g>

  <!-- Spiral rings — 3 bold ones, not 6 faint ones -->
  <ellipse cx="64" cy="50" rx="30" ry="22" fill="none" stroke="#22d3ee" stroke-width="1.8" opacity="0.25"/>
  <ellipse cx="64" cy="50" rx="18" ry="13" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.4"/>
  <ellipse cx="64" cy="50" rx="8" ry="6" fill="none" stroke="#c084fc" stroke-width="2.5" opacity="0.6"/>

  <!-- Core bright -->
  <circle cx="64" cy="50" r="5" fill="#a78bfa" opacity="0.7"/>
  <circle cx="64" cy="50" r="3" fill="#c4b5fd"/>
  <circle cx="64" cy="50" r="1.5" fill="white"/>

  <!-- Beam down -->
  <line x1="64" y1="56" x2="64" y2="82" stroke="url(#beam)" stroke-width="3" stroke-linecap="round"/>

  <!-- Gem glow -->
  <circle cx="64" cy="98" r="14" fill="url(#gem-glow)"/>

  <!-- Gem — bigger, bolder -->
  <path d="M64 82 L76 98 L64 114 L52 98 Z"
        fill="url(#accent)" fill-opacity="0.2"
        stroke="url(#accent)" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Gem inner shine -->
  <path d="M64 86 L72 98 L64 110 L56 98 Z"
        fill="url(#accent)" opacity="0.15"/>

  <!-- Gem highlights -->
  <circle cx="64" cy="82" r="2" fill="#818cf8" opacity="0.7"/>
  <circle cx="64" cy="114" r="1.5" fill="#c084fc" opacity="0.6"/>
</svg>