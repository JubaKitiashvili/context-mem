<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#12102a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <radialGradient id="core-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line-cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="60%" stop-color="#22d3ee" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="line-purple" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0"/>
      <stop offset="60%" stop-color="#c084fc" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>

  <!-- Central glow -->
  <circle cx="64" cy="64" r="28" fill="url(#core-glow)"/>

  <!-- Scattered data lines converging to center — left side (cyan) -->
  <line x1="12" y1="22" x2="54" y2="58" stroke="url(#line-cyan)" stroke-width="2" stroke-linecap="round"/>
  <line x1="10" y1="46" x2="52" y2="60" stroke="url(#line-cyan)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="70" x2="53" y2="66" stroke="url(#line-cyan)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="92" x2="54" y2="70" stroke="url(#line-cyan)" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="108" x2="56" y2="73" stroke="url(#line-cyan)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Scattered data lines converging to center — right side (purple) -->
  <line x1="116" y1="20" x2="74" y2="58" stroke="url(#line-purple)" stroke-width="2" stroke-linecap="round"/>
  <line x1="118" y1="48" x2="76" y2="60" stroke="url(#line-purple)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="114" y1="72" x2="75" y2="66" stroke="url(#line-purple)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="116" y1="96" x2="74" y2="70" stroke="url(#line-purple)" stroke-width="2" stroke-linecap="round"/>
  <line x1="112" y1="110" x2="72" y2="73" stroke="url(#line-purple)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Top/bottom converging lines -->
  <line x1="44" y1="12" x2="60" y2="54" stroke="url(#line-cyan)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="84" y1="14" x2="68" y2="54" stroke="url(#line-purple)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="42" y1="116" x2="60" y2="74" stroke="url(#line-cyan)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="86" y1="114" x2="68" y2="74" stroke="url(#line-purple)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Central diamond (compressed essence) -->
  <path d="M64 48 L78 64 L64 80 L50 64 Z"
        fill="none" stroke="url(#accent)" stroke-width="2.5"
        stroke-linejoin="round"/>
  <path d="M64 50 L76 64 L64 78 L52 64 Z"
        fill="url(#accent)" opacity="0.15"/>

  <!-- Inner diamond shine -->
  <path d="M64 54 L72 64 L64 74 L56 64 Z"
        fill="url(#accent)" opacity="0.25"/>

  <!-- Core bright point -->
  <circle cx="64" cy="64" r="3" fill="white" opacity="0.8"/>
  <circle cx="64" cy="64" r="1.5" fill="white"/>
</svg>