<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#12102a"/>
    </linearGradient>
    <linearGradient id="prism-stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="prism-fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="beam-in" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e2e8f0" stop-opacity="0"/>
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="beam-out" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="inner-glow" cx="0.45" cy="0.5" r="0.4">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>

  <!-- Subtle glow behind prism -->
  <circle cx="62" cy="66" r="30" fill="url(#inner-glow)"/>

  <!-- Incoming scattered rays (noisy data — white/gray, messy) -->
  <g opacity="0.35">
    <line x1="8" y1="36" x2="42" y2="52" stroke="url(#beam-in)" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="48" x2="42" y2="58" stroke="url(#beam-in)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="8" y1="60" x2="42" y2="64" stroke="url(#beam-in)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="10" y1="72" x2="42" y2="70" stroke="url(#beam-in)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="8" y1="84" x2="42" y2="76" stroke="url(#beam-in)" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="94" x2="42" y2="80" stroke="url(#beam-in)" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Extra noise fragments on left -->
  <g opacity="0.15">
    <rect x="14" y="42" width="8" height="1.5" rx="0.75" fill="#94a3b8"/>
    <rect x="18" y="56" width="6" height="1.5" rx="0.75" fill="#94a3b8"/>
    <rect x="12" y="78" width="10" height="1.5" rx="0.75" fill="#94a3b8"/>
    <rect x="16" y="88" width="7" height="1.5" rx="0.75" fill="#94a3b8"/>
  </g>

  <!-- Hexagonal prism -->
  <path d="M48 34 L80 34 L96 64 L80 94 L48 94 L32 64 Z"
        fill="url(#prism-fill)" stroke="url(#prism-stroke)" stroke-width="2"
        stroke-linejoin="round"/>

  <!-- Internal refraction lines -->
  <g opacity="0.15">
    <line x1="40" y1="50" x2="88" y2="50" stroke="url(#prism-stroke)" stroke-width="0.5"/>
    <line x1="36" y1="64" x2="92" y2="64" stroke="url(#prism-stroke)" stroke-width="0.5"/>
    <line x1="40" y1="78" x2="88" y2="78" stroke="url(#prism-stroke)" stroke-width="0.5"/>
  </g>

  <!-- Outgoing single focused beam (compressed — one bright line) -->
  <line x1="96" y1="64" x2="120" y2="64" stroke="url(#beam-out)" stroke-width="3" stroke-linecap="round"/>

  <!-- Beam glow -->
  <line x1="96" y1="64" x2="118" y2="64" stroke="#818cf8" stroke-width="6" stroke-linecap="round" opacity="0.15"/>

  <!-- Bright point where beam exits prism -->
  <circle cx="96" cy="64" r="3" fill="#818cf8" opacity="0.5"/>
  <circle cx="96" cy="64" r="1.5" fill="white" opacity="0.9"/>

  <!-- Tiny "C" or "M" watermark in prism center -->
  <text x="60" y="70" font-family="monospace" font-size="18" font-weight="bold"
        fill="url(#prism-stroke)" opacity="0.2" text-anchor="middle">M</text>
</svg>