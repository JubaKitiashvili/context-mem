<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080816"/>
      <stop offset="100%" stop-color="#100e24"/>
    </linearGradient>
    <linearGradient id="crystal-edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="40%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="crystal-fill" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.07"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="shine" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ray-in" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#94a3b8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#94a3b8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#cbd5e1" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="core-glow" cx="0.5" cy="0.45" r="0.35">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bottom-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="drop-beam" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="64" cy="56" rx="34" ry="30" fill="url(#core-glow)"/>

  <!-- Incoming scattered rays from above -->
  <g>
    <line x1="20" y1="8" x2="52" y2="38" stroke="url(#ray-in)" stroke-width="2" stroke-linecap="round"/>
    <line x1="38" y1="6" x2="56" y2="34" stroke="url(#ray-in)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="56" y1="4" x2="60" y2="32" stroke="url(#ray-in)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="72" y1="4" x2="68" y2="32" stroke="url(#ray-in)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="90" y1="6" x2="72" y2="34" stroke="url(#ray-in)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="108" y1="8" x2="76" y2="38" stroke="url(#ray-in)" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Noise fragments -->
  <g opacity="0.15">
    <rect x="24" y="14" width="8" height="1.5" rx="0.75" fill="#94a3b8" transform="rotate(30 28 14)"/>
    <rect x="46" y="10" width="6" height="1.5" rx="0.75" fill="#64748b" transform="rotate(15 49 10)"/>
    <rect x="80" y="12" width="7" height="1.5" rx="0.75" fill="#94a3b8" transform="rotate(-20 83 12)"/>
    <rect x="100" y="16" width="9" height="1.5" rx="0.75" fill="#64748b" transform="rotate(-35 104 16)"/>
  </g>

  <!-- Crystal body — diamond shape with facets -->
  <!-- Main outline -->
  <path d="M64 28 L92 56 L64 96 L36 56 Z" fill="url(#crystal-fill)"/>

  <!-- Upper left facet highlight -->
  <path d="M64 28 L36 56 L64 56 Z" fill="url(#shine)"/>

  <!-- Internal facet lines -->
  <g opacity="0.12">
    <line x1="64" y1="28" x2="64" y2="96" stroke="url(#crystal-edge)" stroke-width="0.7"/>
    <line x1="36" y1="56" x2="92" y2="56" stroke="url(#crystal-edge)" stroke-width="0.7"/>
    <line x1="50" y1="42" x2="78" y2="76" stroke="url(#crystal-edge)" stroke-width="0.4"/>
    <line x1="78" y1="42" x2="50" y2="76" stroke="url(#crystal-edge)" stroke-width="0.4"/>
  </g>

  <!-- Crystal outline -->
  <path d="M64 28 L92 56 L64 96 L36 56 Z"
        fill="none" stroke="url(#crystal-edge)" stroke-width="2"
        stroke-linejoin="round"/>

  <!-- Vertex highlights -->
  <g opacity="0.5">
    <circle cx="64" cy="28" r="2" fill="#22d3ee"/>
    <circle cx="92" cy="56" r="1.5" fill="#818cf8"/>
    <circle cx="36" cy="56" r="1.5" fill="#22d3ee"/>
    <circle cx="64" cy="96" r="2" fill="#c084fc"/>
  </g>

  <!-- Bottom glow -->
  <circle cx="64" cy="100" r="10" fill="url(#bottom-glow)"/>

  <!-- Output beam downward -->
  <line x1="64" y1="96" x2="64" y2="118" stroke="url(#drop-beam)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="64" y1="96" x2="64" y2="116" stroke="#a78bfa" stroke-width="6" stroke-linecap="round" opacity="0.12"/>

  <!-- Exit bright point -->
  <circle cx="64" cy="96" r="2.5" fill="#c084fc" opacity="0.6"/>
  <circle cx="64" cy="96" r="1.2" fill="white" opacity="0.9"/>

  <!-- Particles along beam -->
  <circle cx="64" cy="104" r="0.8" fill="white" opacity="0.45"/>
  <circle cx="63.5" cy="110" r="0.6" fill="#c084fc" opacity="0.35"/>
</svg>